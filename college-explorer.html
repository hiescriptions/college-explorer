<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>College Explorer — Find Your Perfect University</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --bg: #0d1117;
  --sidebar: #161b22;
  --card: #1c2128;
  --border: #30363d;
  --text: #e6edf3;
  --muted: #8b949e;
  --accent: #58a6ff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

/* ── Sidebar ── */
#sidebar {
  width: 310px; min-width: 310px;
  background: var(--sidebar);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}
#sidebar-header {
  padding: 18px 20px 14px;
  background: linear-gradient(135deg, #1f6feb 0%, #388bfd 100%);
  flex-shrink: 0;
}
#sidebar-header h1 { font-size: 1.15rem; font-weight: 700; letter-spacing: -0.3px; }
#sidebar-header p { font-size: 0.75rem; opacity: 0.85; margin-top: 3px; }

/* ── Filters ── */
#filter-area { padding: 14px 16px 10px; flex-shrink: 0; border-bottom: 1px solid var(--border); }
.filter-group { margin-bottom: 11px; }
.filter-group-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 6px; }
.filter-chips { display: flex; flex-wrap: wrap; gap: 5px; }
.chip {
  padding: 4px 11px; border-radius: 20px; font-size: 0.75rem; font-weight: 500;
  border: 1.5px solid; cursor: pointer; transition: all 0.15s;
  background: transparent; color: inherit;
  display: inline-flex; align-items: center; gap: 4px;
  font-family: inherit;
}
.chip:hover { transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
.chip.active { color: #fff; box-shadow: 0 0 0 2px rgba(255,255,255,0.2); }

.chip-ca    { border-color: #f0883e; color: #f0883e; } .chip-ca.active    { background: #f0883e; }
.chip-uc    { border-color: #58a6ff; color: #58a6ff; } .chip-uc.active    { background: #1f6feb; border-color: #1f6feb; }
.chip-csu   { border-color: #3fb950; color: #3fb950; } .chip-csu.active   { background: #238636; border-color: #238636; }
.chip-priv  { border-color: #bc8cff; color: #bc8cff; } .chip-priv.active  { background: #6e40c9; border-color: #6e40c9; }
.chip-pres  { border-color: #ff7b72; color: #ff7b72; } .chip-pres.active  { background: #b62324; border-color: #b62324; }
.chip-jp    { border-color: #ff69b4; color: #ff69b4; } .chip-jp.active    { background: #a41e60; border-color: #a41e60; }
.chip-cog   { border-color: #39d353; color: #39d353; } .chip-cog.active   { background: #196c2e; border-color: #196c2e; }

#filter-note { font-size: 0.7rem; color: var(--muted); margin-top: 6px; }

#clear-btn {
  display: block; width: calc(100% - 32px); margin: 8px 16px 0;
  padding: 6px; background: transparent; border: 1px solid var(--border);
  border-radius: 6px; color: var(--muted); font-size: 0.78rem; cursor: pointer;
  font-family: inherit; transition: all 0.15s;
}
#clear-btn:hover { border-color: var(--muted); color: var(--text); }

/* ── School list ── */
#list-header {
  padding: 9px 16px; font-size: 0.72rem; color: var(--muted);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
#school-list { overflow-y: auto; flex: 1; }
.school-row {
  padding: 10px 16px; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background 0.12s;
  display: flex; align-items: center; gap: 10px;
}
.school-row:hover { background: var(--card); }
.school-row.highlight { background: rgba(31,111,235,0.12); }
.sr-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.sr-info { flex: 1; min-width: 0; }
.sr-name { font-size: 0.85rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sr-loc  { font-size: 0.72rem; color: var(--muted); margin-top: 1px; }
.sr-tags { display: flex; gap: 3px; margin-top: 4px; flex-wrap: wrap; }
.mini-tag {
  font-size: 0.6rem; padding: 1px 6px; border-radius: 8px; font-weight: 500;
}

/* ── Map ── */
#map { flex: 1; }
.leaflet-popup-content-wrapper { background: #1c2128; border: 1px solid #30363d; border-radius: 8px; color: #e6edf3; }
.leaflet-popup-tip { background: #1c2128; }
.leaflet-popup-content { margin: 10px 14px; font-family: -apple-system, sans-serif; }
.map-popup-name { font-weight: 700; font-size: 0.95rem; margin-bottom: 3px; }
.map-popup-sub  { font-size: 0.75rem; color: #8b949e; margin-bottom: 8px; }
.map-popup-btn {
  display: inline-block; padding: 5px 14px; background: #1f6feb;
  color: white; border-radius: 5px; font-size: 0.78rem; font-weight: 600;
  cursor: pointer; border: none; font-family: inherit; width: 100%; text-align: center;
}
.map-popup-btn:hover { background: #388bfd; }

/* ── Modal ── */
#overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75);
  z-index: 9999; justify-content: center; align-items: center; padding: 16px;
}
#overlay.open { display: flex; }
#modal {
  background: var(--sidebar); border: 1px solid var(--border); border-radius: 12px;
  width: 740px; max-width: 100%; max-height: 92vh; overflow-y: auto;
  box-shadow: 0 24px 64px rgba(0,0,0,0.6);
}
#modal-hdr {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: flex-start;
  position: sticky; top: 0; background: var(--sidebar); z-index: 1;
}
#modal-name { font-size: 1.35rem; font-weight: 700; }
#modal-loc  { font-size: 0.82rem; color: var(--muted); margin-top: 4px; }
#modal-type { font-size: 0.78rem; color: var(--accent); margin-top: 2px; }
#modal-close {
  background: none; border: none; color: var(--muted);
  font-size: 1.4rem; cursor: pointer; padding: 0 4px; line-height: 1;
  flex-shrink: 0; margin-left: 12px;
}
#modal-close:hover { color: var(--text); }
#modal-body { padding: 20px 24px 24px; }

/* Video */
#video-wrap { margin-bottom: 18px; border-radius: 8px; overflow: hidden; position: relative; background: #000; aspect-ratio: 16/9; }
#video-wrap iframe { width: 100%; height: 100%; border: none; position: absolute; inset: 0; }
#yt-placeholder {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 10px;
  background: linear-gradient(135deg, #161b22 0%, #1c2128 100%);
}
#yt-placeholder .yt-icon { font-size: 3rem; }
#yt-search-btn {
  padding: 8px 20px; background: #ff0000; color: white; border-radius: 6px;
  font-size: 0.85rem; font-weight: 600; cursor: pointer; border: none;
  font-family: inherit; text-decoration: none; display: inline-block;
}
#yt-search-btn:hover { background: #cc0000; }
#yt-placeholder p { font-size: 0.78rem; color: var(--muted); text-align: center; }

/* Stats grid */
.stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
.stat-box { background: var(--card); border-radius: 8px; padding: 11px 12px; border: 1px solid var(--border); }
.stat-label { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); }
.stat-val   { font-size: 0.95rem; font-weight: 600; margin-top: 3px; }

/* Tags in modal */
#modal-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
.modal-tag {
  font-size: 0.72rem; padding: 3px 10px; border-radius: 12px; font-weight: 500;
  border: 1.5px solid;
}

/* Description */
#modal-desc { font-size: 0.88rem; line-height: 1.65; color: #c9d1d9; margin-bottom: 20px; }

/* Actions */
.action-row { display: flex; gap: 10px; }
.btn-main {
  flex: 1; padding: 11px; background: linear-gradient(135deg, #1f6feb, #388bfd);
  color: white; border: none; border-radius: 8px; font-size: 0.875rem;
  font-weight: 600; cursor: pointer; text-decoration: none; text-align: center;
  font-family: inherit; transition: opacity 0.15s;
}
.btn-main:hover { opacity: 0.88; }
.btn-sec {
  flex: 1; padding: 11px; background: transparent; border: 1.5px solid var(--border);
  color: var(--text); border-radius: 8px; font-size: 0.875rem; font-weight: 600;
  cursor: pointer; text-decoration: none; text-align: center;
  font-family: inherit; transition: all 0.15s;
}
.btn-sec:hover { border-color: var(--accent); color: var(--accent); background: rgba(88,166,255,0.08); }

/* Custom Leaflet markers */
.pin {
  width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.62rem; font-weight: 800; color: white;
  box-shadow: 0 2px 8px rgba(0,0,0,0.5);
  border: 2px solid rgba(255,255,255,0.8);
  cursor: pointer; transition: transform 0.2s;
  line-height: 1;
}
.pin:hover { transform: scale(1.25); z-index: 999 !important; }

/* Scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }
</style>
</head>

  desc:"The University of Arizona has a nationally recognized Japanese program through the Department of East Asian Studies, and the Cognitive Science program is highly interdisciplinary. UA is also home to one of the world's leading consciousness research groups — the Center for Consciousness Studies hosts the renowned Tucson Conferences on the Science of Consciousness. Strong programs in astronomy, optical sciences, and anthropology as well.",
  website:"https://www.arizona.edu",
  apply:"https://admissions.arizona.edu",
  videoId:null,
  ytq:"University of Arizona campus tour Tucson"
},
{
  id:48, name:"UT Austin", abbr:"UT",
  lat:30.2849, lng:-97.7341,
  tags:["pres","jp","cog"],
  city:"Austin, TX", type:"Public Research University", founded:1883,
  enrollment:"~51,000", acceptance:"~29%", tuition:"~$11K in / $41K out",
  desc:"UT Austin is a flagship public research university and one of the best values in American higher education. The Department of Asian Studies offers excellent Japanese language and literature programs. The Cognitive Systems and Cognitive Science certificates and courses draw from linguistics, computer science, and psychology. Austin is one of the hottest tech and music cities in America, and UT's connections to the local ecosystem are exceptional.",
  website:"https://www.utexas.edu",
  apply:"https://admissions.utexas.edu",
  videoId:null,
  ytq:"UT Austin University of Texas campus tour"
},
];

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let activeFilters = new Set();
let markers = {};   // id → leaflet layer
let currentSchool = null;

// ══════════════════════════════════════════════
//  MAP INIT
// ══════════════════════════════════════════════
const map = L.map('map', {
  center: [38, -96],
  zoom: 4,
  zoomControl: true,
  attributionControl: true
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO',
  subdomains: 'abcd',
  maxZoom: 18
}).addTo(map);

// ══════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════
function schoolMatches(school) {
  if (activeFilters.size === 0) return true;
  for (const f of activeFilters) {
    if (!school.tags.includes(f)) return false;
  }
  return true;
}

function tagStyle(tag) {
  const t = TAGS[tag];
  return t ? `color:${t.color};border-color:${t.color};` : '';
}

function tagLabel(tag) {
  return TAGS[tag]?.label || tag;
}

function chipClass(tag) {
  const map = { ca:'chip-ca', uc:'chip-uc', csu:'chip-csu', priv:'chip-priv', pres:'chip-pres', jp:'chip-jp', cog:'chip-cog' };
  return map[tag] || '';
}

// ══════════════════════════════════════════════
//  MARKERS
// ══════════════════════════════════════════════
function createMarker(school) {
  const color = markerColor(school.tags);
  const icon = L.divIcon({
    className: '',
    html: `<div class="pin" style="background:${color};" title="${school.name}">${school.abbr.substring(0,3)}</div>`,
    iconSize: [30, 30],
    iconAnchor: [15, 15],
    popupAnchor: [0, -18]
  });

  const marker = L.marker([school.lat, school.lng], { icon })
    .addTo(map)
    .bindPopup(`
      <div class="map-popup-name">${school.name}</div>
      <div class="map-popup-sub">${school.city} · ${school.type}</div>
      <button class="map-popup-btn" onclick="openModal(${school.id})">View Details →</button>
    `, { maxWidth: 220 });

  marker.on('click', () => {
    highlightListItem(school.id);
  });

  return marker;
}

function buildMarkers() {
  // Clear existing
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};

  const visible = SCHOOLS.filter(schoolMatches);
  visible.forEach(s => {
    markers[s.id] = createMarker(s);
  });

  updateCount(visible.length);
  buildList(visible);
}

// ══════════════════════════════════════════════
//  SIDEBAR LIST
// ══════════════════════════════════════════════
function buildList(schools) {
  const el = document.getElementById('school-list');
  el.innerHTML = '';
  schools.forEach(s => {
    const color = markerColor(s.tags);
    const tagHtml = s.tags.map(t =>
      `<span class="mini-tag" style="background:${TAGS[t]?.color}22;color:${TAGS[t]?.color};border:1px solid ${TAGS[t]?.color}44">${tagLabel(t)}</span>`
    ).join('');
    const row = document.createElement('div');
    row.className = 'school-row';
    row.id = `row-${s.id}`;
    row.innerHTML = `
      <div class="sr-dot" style="background:${color}"></div>
      <div class="sr-info">
        <div class="sr-name">${s.name}</div>
        <div class="sr-loc">${s.city}</div>
        <div class="sr-tags">${tagHtml}</div>
      </div>
    `;
    row.addEventListener('click', () => {
      // Pan to marker and open popup
      if (markers[s.id]) {
        map.setView([s.lat, s.lng], 10, { animate: true });
        setTimeout(() => markers[s.id].openPopup(), 400);
      }
      highlightListItem(s.id);
    });
    row.addEventListener('dblclick', () => openModal(s.id));
    el.appendChild(row);
  });
}

function highlightListItem(id) {
  document.querySelectorAll('.school-row').forEach(r => r.classList.remove('highlight'));
  const row = document.getElementById(`row-${id}`);
  if (row) {
    row.classList.add('highlight');
    row.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

function updateCount(n) {
  document.getElementById('count').textContent = n;
}

// ══════════════════════════════════════════════
//  FILTERS
// ══════════════════════════════════════════════
document.querySelectorAll('.chip[data-f]').forEach(btn => {
  btn.addEventListener('click', () => {
    const f = btn.dataset.f;
    if (activeFilters.has(f)) {
      activeFilters.delete(f);
      btn.classList.remove('active');
    } else {
      activeFilters.add(f);
      btn.classList.add('active');
    }
    buildMarkers();
  });
});

document.getElementById('clear-btn').addEventListener('click', () => {
  activeFilters.clear();
  document.querySelectorAll('.chip[data-f]').forEach(b => b.classList.remove('active'));
  buildMarkers();
});

// ══════════════════════════════════════════════
//  MODAL
// ══════════════════════════════════════════════
window.openModal = function(id) {
  const s = SCHOOLS.find(x => x.id === id);
  if (!s) return;
  currentSchool = s;

  document.getElementById('modal-name').textContent = s.name;
  document.getElementById('modal-loc').textContent = `📍 ${s.city}`;
  document.getElementById('modal-type').textContent = s.type + (s.founded ? `  ·  Est. ${s.founded}` : '');

  // Video
  const videoWrap = document.getElementById('video-wrap');
  const placeholder = document.getElementById('yt-placeholder');
  const searchBtn = document.getElementById('yt-search-btn');
  const ytUrl = `https://www.youtube.com/results?search_query=${encodeURIComponent(s.ytq)}`;
  searchBtn.href = ytUrl;

  // Remove old iframe if any
  const oldIframe = videoWrap.querySelector('iframe');
  if (oldIframe) oldIframe.remove();

  if (s.videoId) {
    placeholder.style.display = 'none';
    const iframe = document.createElement('iframe');
    iframe.src = `https://www.youtube.com/embed/${s.videoId}?rel=0`;
    iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
    iframe.allowFullscreen = true;
    videoWrap.appendChild(iframe);
  } else {
    placeholder.style.display = 'flex';
  }

  // Stats
  document.getElementById('modal-stats').innerHTML = `
    <div class="stat-box"><div class="stat-label">Enrollment</div><div class="stat-val">${s.enrollment}</div></div>
    <div class="stat-box"><div class="stat-label">Acceptance</div><div class="stat-val">${s.acceptance}</div></div>
    <div class="stat-box"><div class="stat-label">Tuition</div><div class="stat-val">${s.tuition}</div></div>
  `;

  // Tags
  document.getElementById('modal-tags').innerHTML = s.tags.map(t =>
    `<span class="modal-tag" style="${tagStyle(t)}">${tagLabel(t)}</span>`
  ).join('');

  // Desc
  document.getElementById('modal-desc').textContent = s.desc;

  // Actions
  document.getElementById('modal-actions').innerHTML = `
    <a class="btn-main" href="${s.website}" target="_blank" rel="noopener">Visit Website →</a>
    <a class="btn-sec" href="${s.apply}" target="_blank" rel="noopener">Apply / Admissions</a>
  `;

  document.getElementById('overlay').classList.add('open');
};

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  // Stop video
  const iframe = document.querySelector('#video-wrap iframe');
  if (iframe) iframe.src = iframe.src; // reset
}

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
buildMarkers();
</script>
</body>
</html>
