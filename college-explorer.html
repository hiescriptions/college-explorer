<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cedar's College Explorer</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
/* ══ LIGHT MODE (default) ══ */
:root {
  --bg:         #f5f5f7;
  --panel-bg:   #ffffff;
  --card:       #f5f5f7;
  --card-hover: #e8e8ed;
  --border:     #d2d2d7;
  --text:       #1d1d1f;
  --text2:      #3a3a3c;
  --muted:      #6e6e73;
  --accent:     #0071e3;
  --accent-h:   #0077ed;
  --map-tiles:  light;
  --shadow:     0 2px 12px rgba(0,0,0,0.09), 0 1px 3px rgba(0,0,0,0.06);
  --logo-bg:    #f0f0f5;
}

/* ══ DARK MODE ══ */
[data-theme="dark"] {
  --bg:         #0d1117;
  --panel-bg:   #161b22;
  --card:       #1c2128;
  --card-hover: #262d38;
  --border:     #30363d;
  --text:       #e6edf3;
  --text2:      #c9d1d9;
  --muted:      #8b949e;
  --accent:     #58a6ff;
  --accent-h:   #79b8ff;
  --shadow:     0 2px 12px rgba(0,0,0,0.4), 0 1px 3px rgba(0,0,0,0.3);
  --logo-bg:    #1c2128;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
  background: var(--bg); color: var(--text);
  display: flex; height: 100vh; overflow: hidden;
  -webkit-font-smoothing: antialiased;
  transition: background 0.25s, color 0.25s;
}

/* ══ LEFT SIDEBAR ══ */
#sidebar {
  width: 300px; min-width: 300px;
  background: var(--panel-bg);
  display: flex; flex-direction: column; overflow: hidden;
  border-right: 1px solid var(--border);
  z-index: 10;
  transition: background 0.25s, border-color 0.25s;
}

#sidebar-header {
  padding: 14px 14px 11px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.header-top { display: flex; align-items: center; gap: 8px; }
.cedar-icon { font-size: 1.4rem; line-height: 1; flex-shrink: 0; }
.header-title { flex: 1; min-width: 0; }
#sidebar-header h1 { font-size: 0.98rem; font-weight: 700; letter-spacing: -0.3px; }
#sidebar-header p  { font-size: 0.67rem; color: var(--muted); margin-top: 2px; }

/* Theme toggle */
#theme-toggle {
  width: 32px; height: 32px; border-radius: 50%;
  border: 1px solid var(--border); background: var(--card);
  cursor: pointer; display: flex; align-items: center;
  justify-content: center; font-size: 0.9rem;
  transition: all 0.15s; flex-shrink: 0;
  font-family: inherit;
}
#theme-toggle:hover { background: var(--card-hover); transform: scale(1.1); }

/* ══ FILTERS ══ */
#filter-area {
  padding: 11px 13px 9px;
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
}
.filter-group { margin-bottom: 9px; }
.filter-group:last-child { margin-bottom: 0; }
.filter-group-label {
  font-size: 0.59rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.8px; color: var(--muted); margin-bottom: 5px;
}
.filter-chips { display: flex; flex-wrap: wrap; gap: 4px; }
.chip {
  padding: 4px 9px; border-radius: 100px; font-size: 0.7rem;
  font-weight: 500; border: 1.5px solid; cursor: pointer;
  transition: all 0.15s; background: transparent;
  display: inline-flex; align-items: center; gap: 3px;
  font-family: inherit;
}
.chip:hover { transform: translateY(-1px); }
.chip:active { transform: scale(0.96); }
.chip.active { color: #fff !important; }

.chip-ca   { border-color:#e8820c;color:#c96800; } .chip-ca.active   { background:#e8820c;border-color:#e8820c; }
.chip-uc   { border-color:#006fce;color:#005db5; } .chip-uc.active   { background:#006fce;border-color:#006fce; }
.chip-csu  { border-color:#1a9244;color:#157838; } .chip-csu.active  { background:#1a9244;border-color:#1a9244; }
.chip-priv { border-color:#7635d4;color:#6228be; } .chip-priv.active { background:#7635d4;border-color:#7635d4; }
.chip-pres { border-color:#c9930a;color:#a87a00; } .chip-pres.active { background:#c9930a;border-color:#c9930a; }
.chip-jp   { border-color:#d4006e;color:#b5005d; } .chip-jp.active   { background:#d4006e;border-color:#d4006e; }
.chip-cog  { border-color:#00897b;color:#00695c; } .chip-cog.active  { background:#00897b;border-color:#00897b; }
.chip-liked{ border-color:#e03131;color:#c92a2a; } .chip-liked.active{ background:#e03131;border-color:#e03131; }

#filter-note { font-size: 0.62rem; color: var(--muted); margin-top: 5px; }
#clear-btn {
  display: block; width: 100%; margin-top: 7px; padding: 5px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 7px; color: var(--muted); font-size: 0.72rem;
  cursor: pointer; font-family: inherit; font-weight: 500; transition: all 0.15s;
}
#clear-btn:hover { background: var(--card-hover); color: var(--text); }

/* ══ SCHOOL LIST ══ */
#list-header {
  padding: 6px 13px; font-size: 0.68rem; color: var(--muted);
  font-weight: 500; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
#school-list { overflow-y: auto; flex: 1; }
.school-row {
  padding: 8px 11px; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background 0.1s;
  display: flex; align-items: center; gap: 8px;
  background: var(--panel-bg);
}
.school-row:hover     { background: var(--card); }
.school-row.highlight { background: rgba(0,113,227,0.1); }
[data-theme="dark"] .school-row.highlight { background: rgba(88,166,255,0.12); }

.sr-dot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.sr-info { flex: 1; min-width: 0; }
.sr-name { font-size: 0.8rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: -0.1px; }
.sr-loc  { font-size: 0.66rem; color: var(--muted); margin-top: 1px; }
.sr-tags { display: flex; gap: 3px; margin-top: 3px; flex-wrap: wrap; }
.mini-tag { font-size: 0.57rem; padding: 1px 5px; border-radius: 4px; font-weight: 500; }
.like-btn {
  background: none; border: none; cursor: pointer; font-size: 0.95rem;
  padding: 3px; border-radius: 50%; transition: all 0.15s;
  flex-shrink: 0; color: var(--border); line-height: 1;
}
.like-btn:hover { transform: scale(1.2); color: #e03131; }
.like-btn.liked { color: #e03131; }

#empty-state {
  display: none; padding: 28px 16px; text-align: center;
  color: var(--muted); font-size: 0.8rem;
}

/* ══ MAP ══ */
#map { flex: 1; }

/* Leaflet popup — adapts to theme */
.leaflet-popup-content-wrapper {
  background: var(--panel-bg) !important;
  border: 1px solid var(--border) !important;
  border-radius: 10px !important;
  box-shadow: var(--shadow) !important;
  color: var(--text) !important;
}
.leaflet-popup-tip { background: var(--panel-bg) !important; }
.leaflet-popup-content { margin: 10px 14px !important; font-family: -apple-system, sans-serif; }
.map-popup-name { font-weight: 700; font-size: 0.88rem; letter-spacing: -0.2px; color: var(--text); }
.map-popup-sub  { font-size: 0.7rem; color: var(--muted); margin: 2px 0 0; }

/* ══ RIGHT DETAIL PANEL ══ */
#detail-panel {
  width: 0; min-width: 0;
  background: var(--panel-bg);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
  transition: width 0.3s cubic-bezier(0.4,0,0.2,1), min-width 0.3s cubic-bezier(0.4,0,0.2,1);
  z-index: 10;
}
#detail-panel.open { width: 420px; min-width: 420px; }
#detail-scroll { overflow-y: auto; flex: 1; }

/* Panel sticky header */
#dp-header {
  padding: 13px 15px 11px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  position: sticky; top: 0;
  background: var(--panel-bg);
  z-index: 2;
}
.dp-header-top { display: flex; align-items: center; gap: 9px; }

/* School logo */
.dp-logo-wrap {
  width: 44px; height: 44px; border-radius: 10px;
  background: var(--logo-bg); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; flex-shrink: 0;
}
.dp-logo-wrap img {
  width: 36px; height: 36px; object-fit: contain; display: block;
}
.dp-logo-text {
  font-size: 0.65rem; font-weight: 800; color: white;
  width: 44px; height: 44px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  letter-spacing: -0.5px; flex-shrink: 0;
}

.dp-title-area { flex: 1; min-width: 0; }
#dp-name { font-size: 1rem; font-weight: 700; letter-spacing: -0.3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#dp-loc  { font-size: 0.69rem; color: var(--muted); margin-top: 2px; }
#dp-type { font-size: 0.67rem; color: var(--accent); font-weight: 500; margin-top: 1px; }

.dp-hdr-btns { display: flex; gap: 5px; flex-shrink: 0; }
.dp-icon-btn {
  width: 30px; height: 30px; border-radius: 50%;
  border: 1px solid var(--border); background: var(--card);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 0.85rem; transition: all 0.15s; font-family: inherit;
}
.dp-icon-btn:hover { background: var(--card-hover); }
#dp-like-btn.liked { color: #e03131; border-color: #e03131; background: rgba(224,49,49,0.08); }

/* ══ VIDEO SECTION ══ */
#dp-video-section { padding: 13px 15px 0; }
.yt-card {
  border-radius: 10px; overflow: hidden;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  padding: 24px 20px;
  display: flex; flex-direction: column; align-items: center;
  gap: 12px; text-align: center;
}
.yt-card-icon { font-size: 2.2rem; }
.yt-card-title { font-size: 0.82rem; font-weight: 600; color: rgba(255,255,255,0.9); }
.yt-card-sub   { font-size: 0.7rem; color: rgba(255,255,255,0.55); }
.yt-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 18px; background: #ff0000; color: white;
  border-radius: 8px; font-size: 0.78rem; font-weight: 700;
  text-decoration: none; transition: background 0.15s, transform 0.1s;
  border: none; cursor: pointer; font-family: inherit;
}
.yt-btn:hover { background: #d90000; transform: scale(1.03); }
.yt-btn-icon { font-size: 1rem; }

/* ══ STATS ══ */
#dp-stats { padding: 13px 15px 0; }
.stat-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 7px; }
.stat-box {
  background: var(--card); border-radius: 9px;
  padding: 9px 10px; border: 1px solid var(--border);
}
.stat-label { font-size: 0.56rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); }
.stat-val   { font-size: 0.86rem; font-weight: 700; margin-top: 3px; letter-spacing: -0.2px; }
.stat-note  { font-size: 0.56rem; color: var(--muted); margin-top: 1px; }

/* ══ TAGS ══ */
#dp-tags { padding: 11px 15px 0; display: flex; flex-wrap: wrap; gap: 5px; }
.dp-tag  { font-size: 0.67rem; padding: 3px 9px; border-radius: 6px; font-weight: 500; border: 1.5px solid; }

/* ══ SECTIONS ══ */
.dp-section { padding: 13px 15px 0; }
.dp-section-title {
  font-size: 0.59rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.8px; color: var(--muted); margin-bottom: 7px;
}
#dp-desc { font-size: 0.81rem; line-height: 1.65; color: var(--text2); }
#dp-programs { display: flex; flex-wrap: wrap; gap: 5px; }
.prog-tag {
  font-size: 0.7rem; padding: 4px 9px; border-radius: 6px;
  background: var(--card); border: 1px solid var(--border);
  color: var(--text); font-weight: 500;
}

/* ══ ACTIONS ══ */
#dp-actions { padding: 14px 15px 15px; display: flex; gap: 8px; }
.btn-main {
  flex: 1; padding: 10px; background: var(--accent); color: white;
  border: none; border-radius: 9px; font-size: 0.8rem; font-weight: 600;
  cursor: pointer; text-decoration: none; text-align: center;
  font-family: inherit; transition: background 0.15s;
}
.btn-main:hover { background: var(--accent-h); }
.btn-sec {
  flex: 1; padding: 10px; background: var(--card); color: var(--text);
  border: 1px solid var(--border); border-radius: 9px; font-size: 0.8rem;
  font-weight: 600; cursor: pointer; text-decoration: none; text-align: center;
  font-family: inherit; transition: all 0.15s;
}
.btn-sec:hover { background: var(--card-hover); }

/* ══ MAP PINS ══ */
.pin {
  width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.57rem; font-weight: 800; color: white;
  box-shadow: 0 2px 6px rgba(0,0,0,0.25), 0 0 0 2.5px rgba(255,255,255,0.85);
  cursor: pointer; transition: transform 0.15s; letter-spacing: -0.5px;
}
.pin:hover { transform: scale(1.25); }
[data-theme="dark"] .pin { box-shadow: 0 2px 6px rgba(0,0,0,0.5), 0 0 0 2px rgba(255,255,255,0.4); }

/* ══ SCROLLBAR ══ */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>

</div><!-- /detail-panel -->

// ══════════════════════════════════════════════
//  THEME
// ══════════════════════════════════════════════
let isDark = localStorage.getItem('cedar-theme') === 'dark';

function applyTheme() {
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.getElementById('theme-toggle').textContent = isDark ? '☀️' : '🌙';
  // Swap map tiles
  if (window._lightLayer && window._darkLayer) {
    if (isDark) { map.removeLayer(window._lightLayer); window._darkLayer.addTo(map); }
    else         { map.removeLayer(window._darkLayer);  window._lightLayer.addTo(map); }
  }
}

document.getElementById('theme-toggle').addEventListener('click', () => {
  isDark = !isDark;
  localStorage.setItem('cedar-theme', isDark ? 'dark' : 'light');
  applyTheme();
});

// ══════════════════════════════════════════════
//  LIKES
// ══════════════════════════════════════════════
let likedIds = new Set(JSON.parse(localStorage.getItem('cedar-likes') || '[]'));

function saveLikes() { localStorage.setItem('cedar-likes', JSON.stringify([...likedIds])); }

function toggleLike(id) {
  likedIds.has(id) ? likedIds.delete(id) : likedIds.add(id);
  saveLikes();
  updateLikeBadge();
  buildMarkers();
  if (currentId === id) syncLikeBtns(id);
}

function updateLikeBadge() {
  const n = likedIds.size;
  document.getElementById('like-count-badge').textContent = n > 0 ? `(${n})` : '';
}

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let activeFilters = new Set();
let markers = {};
let currentId = null;

// ══════════════════════════════════════════════
//  MAP — two tile layers for theme switching
// ══════════════════════════════════════════════
const map = L.map('map', { center:[38,-96], zoom:4 });

window._lightLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution:'© OpenStreetMap © CARTO', subdomains:'abcd', maxZoom:18
});
window._darkLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution:'© OpenStreetMap © CARTO', subdomains:'abcd', maxZoom:18
});

// Add correct tile for initial theme
if (isDark) { window._darkLayer.addTo(map); }
else         { window._lightLayer.addTo(map); }

// ══════════════════════════════════════════════
//  FILTER LOGIC
// ══════════════════════════════════════════════
function schoolMatches(s) {
  for (const f of activeFilters) {
    if (f === 'liked') { if (!likedIds.has(s.id)) return false; }
    else               { if (!s.tags.includes(f)) return false; }
  }
  return true;
}

// ══════════════════════════════════════════════
//  MARKERS — clicking opens detail panel directly
// ══════════════════════════════════════════════
function createMarker(s) {
  const color = markerColor(s.tags);
  const heart = likedIds.has(s.id)
    ? `<span style="position:absolute;top:-4px;right:-4px;font-size:8px;background:white;border-radius:50%;width:13px;height:13px;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(0,0,0,.25);line-height:13px;text-align:center;">❤</span>`
    : '';

  const icon = L.divIcon({
    className: '',
    html: `<div style="position:relative;width:30px;height:30px;"><div class="pin" style="background:${color};">${s.abbr.substring(0,3)}</div>${heart}</div>`,
    iconSize:[30,30], iconAnchor:[15,15], popupAnchor:[0,-18]
  });

  const marker = L.marker([s.lat, s.lng], { icon })
    .addTo(map)
    .bindPopup(
      `<div class="map-popup-name">${s.name}</div><div class="map-popup-sub">${s.city}</div>`,
      { maxWidth:180, closeButton:false, autoPan:false }
    );

  // Single click → open detail panel AND show popup
  marker.on('click', () => {
    openDetail(s.id);
  });

  return marker;
}

function buildMarkers() {
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};
  const visible = SCHOOLS.filter(schoolMatches);
  visible.forEach(s => { markers[s.id] = createMarker(s); });
  document.getElementById('count').textContent = visible.length;
  buildList(visible);
  const empty = document.getElementById('empty-state');
  const list  = document.getElementById('school-list');
  empty.style.display = visible.length === 0 ? 'block' : 'none';
  list.style.display  = visible.length === 0 ? 'none'  : '';
}

// ══════════════════════════════════════════════
//  SIDEBAR LIST
// ══════════════════════════════════════════════
function buildList(schools) {
  const el = document.getElementById('school-list');
  el.innerHTML = '';
  schools.forEach(s => {
    const color   = markerColor(s.tags);
    const isLiked = likedIds.has(s.id);
    const tagHtml = s.tags.map(t =>
      `<span class="mini-tag" style="background:${TAGS[t]?.color}18;color:${TAGS[t]?.color};border:1px solid ${TAGS[t]?.color}30">${TAGS[t]?.label||t}</span>`
    ).join('');

    const row = document.createElement('div');
    row.className = 'school-row';
    row.id = `row-${s.id}`;
    row.innerHTML = `
      <div class="sr-dot" style="background:${color}"></div>
      <div class="sr-info">
        <div class="sr-name">${s.name}</div>
        <div class="sr-loc">${s.city}</div>
        <div class="sr-tags">${tagHtml}</div>
      </div>
      <button class="like-btn ${isLiked?'liked':''}" data-id="${s.id}">${isLiked?'❤️':'🤍'}</button>
    `;
    row.querySelector('.like-btn').addEventListener('click', e => { e.stopPropagation(); toggleLike(s.id); });
    row.addEventListener('click', () => openDetail(s.id));
    el.appendChild(row);
  });
}

function highlightRow(id) {
  document.querySelectorAll('.school-row').forEach(r => r.classList.remove('highlight'));
  const row = document.getElementById(`row-${id}`);
  if (row) { row.classList.add('highlight'); row.scrollIntoView({ behavior:'smooth', block:'nearest' }); }
}

// ══════════════════════════════════════════════
//  FILTERS
// ══════════════════════════════════════════════
document.querySelectorAll('.chip[data-f]').forEach(btn => {
  btn.addEventListener('click', () => {
    const f = btn.dataset.f;
    activeFilters.has(f) ? (activeFilters.delete(f), btn.classList.remove('active'))
                         : (activeFilters.add(f),    btn.classList.add('active'));
    buildMarkers();
  });
});
document.getElementById('clear-btn').addEventListener('click', () => {
  activeFilters.clear();
  document.querySelectorAll('.chip[data-f]').forEach(b => b.classList.remove('active'));
  buildMarkers();
});

// ══════════════════════════════════════════════
//  LIKE SYNC
// ══════════════════════════════════════════════
function syncLikeBtns(id) {
  const liked = likedIds.has(id);
  const btn = document.getElementById('dp-like-btn');
  btn.textContent = liked ? '❤️' : '🤍';
  btn.classList.toggle('liked', liked);
  const rowBtn = document.querySelector(`#row-${id} .like-btn`);
  if (rowBtn) { rowBtn.textContent = liked ? '❤️' : '🤍'; rowBtn.classList.toggle('liked', liked); }
}

// ══════════════════════════════════════════════
//  DETAIL PANEL
// ══════════════════════════════════════════════
window.openDetail = function(id) {
  const s = SCHOOLS.find(x => x.id === id);
  if (!s) return;
  currentId = id;

  // Open panel
  document.getElementById('detail-panel').classList.add('open');

  // Logo: try Google favicon service, fall back to colored text badge
  const logoWrap = document.getElementById('dp-logo-wrap');
  const logoImg  = document.getElementById('dp-logo');

  // Reset to img approach
  logoWrap.innerHTML = `<img id="dp-logo" src="${s.logoUrl}" alt="${s.abbr}"
    style="width:32px;height:32px;object-fit:contain;"
    onerror="this.parentElement.innerHTML='<div style=\\'width:44px;height:44px;border-radius:10px;background:${markerColor(s.tags)};display:flex;align-items:center;justify-content:center;font-size:0.62rem;font-weight:800;color:white;letter-spacing:-0.5px;\\'>${s.abbr.substring(0,4)}</div>'"/>`;

  document.getElementById('dp-name').textContent = s.name;
  document.getElementById('dp-loc').textContent  = `📍 ${s.city}`;
  document.getElementById('dp-type').textContent = `${s.type} · Est. ${s.founded}`;
  syncLikeBtns(id);

  // YouTube link card — always reliable
  const ytUrl = `https://www.youtube.com/results?search_query=${encodeURIComponent(s.ytq)}`;
  document.getElementById('dp-video-section').innerHTML = `
    <div class="yt-card">
      <div class="yt-card-icon">🎬</div>
      <div class="yt-card-title">${s.name} Campus Tour</div>
      <div class="yt-card-sub">Watch official tour &amp; overview videos</div>
      <a class="yt-btn" href="${ytUrl}" target="_blank" rel="noopener">
        <span class="yt-btn-icon">▶</span> Watch on YouTube
      </a>
    </div>`;

  // Stats
  document.getElementById('dp-stat-grid').innerHTML = `
    <div class="stat-box"><div class="stat-label">Enrollment</div><div class="stat-val">${s.enrollment}</div></div>
    <div class="stat-box"><div class="stat-label">Acceptance</div><div class="stat-val">${s.acceptance}</div></div>
    <div class="stat-box"><div class="stat-label">Avg GPA</div><div class="stat-val">${s.gpa}</div><div class="stat-note">unweighted</div></div>
    <div class="stat-box"><div class="stat-label">SAT Range</div><div class="stat-val">${s.sat}</div><div class="stat-note">middle 50%</div></div>
    <div class="stat-box"><div class="stat-label">Tuition</div><div class="stat-val" style="font-size:0.76rem;">${s.tuition}</div><div class="stat-note">in / out-of-state</div></div>
    <div class="stat-box"><div class="stat-label">ECHS Grads/yr</div><div class="stat-val">${s.echs}</div><div class="stat-note">est. El Cerrito HS</div></div>
  `;

  // Tags
  document.getElementById('dp-tags').innerHTML = s.tags.map(t =>
    `<span class="dp-tag" style="color:${TAGS[t]?.color};border-color:${TAGS[t]?.color}50;background:${TAGS[t]?.color}10">${TAGS[t]?.label||t}</span>`
  ).join('');

  // Programs
  document.getElementById('dp-programs').innerHTML = (s.programs||[]).map(p =>
    `<span class="prog-tag">${p}</span>`
  ).join('');

  // About
  document.getElementById('dp-desc').textContent = s.desc;

  // Buttons
  document.getElementById('dp-website').href = s.website;
  document.getElementById('dp-apply').href   = s.apply;

  // Reset scroll
  document.getElementById('detail-scroll').scrollTop = 0;

  // Highlight row + open popup on marker
  highlightRow(id);
  if (markers[id]) {
    map.setView([s.lat, s.lng], 10, { animate:true });
    setTimeout(() => { if (markers[id]) markers[id].openPopup(); }, 300);
  }
};

// Close panel
document.getElementById('dp-close-btn').addEventListener('click', () => {
  document.getElementById('detail-panel').classList.remove('open');
  document.querySelectorAll('.school-row').forEach(r => r.classList.remove('highlight'));
  if (currentId && markers[currentId]) markers[currentId].closePopup();
  currentId = null;
});

// Like from panel
document.getElementById('dp-like-btn').addEventListener('click', () => {
  if (currentId) toggleLike(currentId);
});

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
applyTheme();
updateLikeBadge();
buildMarkers();
</script>
</body>
</html>
